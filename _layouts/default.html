<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · The StatBase{% else %}The StatBase — Advanced Sports Analytics{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}Advanced analytics for professional and collegiate sports. NFL, NBA, and NCAA research by Drew Schmidt.{% endif %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>

<!-- TOP NAV -->
<header class="top-nav">
  <div class="nav-inner">
    <a href="{{ '/' | relative_url }}" class="nav-brand">The StatBase</a>
    <nav class="nav-links" id="navLinks" role="navigation" aria-label="Main">
      <a href="{{ '/' | relative_url }}" class="nav-home-link{% if page.url == '/' %} active{% endif %}">Home</a>
      <a href="{{ '/projects/' | relative_url }}" class="nav-projects-btn{% if page.url == '/projects/' %} active{% endif %}">Projects</a>
    </nav>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- PAGE CONTENT -->
<main class="site-main" id="main-content">
  {{ content }}
</main>

<!-- FOOTER -->
<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-left">
      <span class="footer-brand">The StatBase</span>
      <span class="footer-tagline">Advanced Sports Analytics</span>
    </div>
    <a href="mailto:dgschmidt00@icloud.com" class="footer-email">dgschmidt00@icloud.com</a>
  </div>
</footer>

<script>
  var toggle = document.getElementById('navToggle');
  var links  = document.getElementById('navLinks');
  toggle.addEventListener('click', function() {
    var open = links.classList.toggle('open');
    toggle.classList.toggle('open');
    toggle.setAttribute('aria-expanded', open);
  });
  document.addEventListener('click', function(e) {
    if (!links.contains(e.target) && !toggle.contains(e.target)) {
      links.classList.remove('open');
      toggle.classList.remove('open');
      toggle.setAttribute('aria-expanded', 'false');
    }
  });
</script>

</body>
</html>
